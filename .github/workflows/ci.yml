name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import checks
        run: |
          python -c "import twin_api; import serve; import ws_handler"
          python -c "import ingest_real_dataset; import stitch_mosaic; import run_twin"
          python -c "from twin_api import get_telemetry, get_telemetry_history, get_assets, get_alarms; assert get_telemetry_history(5)['count'] >= 0"

      - name: Optional lint (ruff)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check twin_api.py serve.py ws_handler.py run_twin.py --select E,F,W
